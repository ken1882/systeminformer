name: 'continuous-integration'

on:
  workflow_dispatch:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: ['windows-latest']
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

    - name: NuGet Cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.config') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Nuget Restore
      shell: cmd
      working-directory: ${{github.workspace}}
      run: nuget restore .\packages.config -PackagesDirectory .\packages\

    - name: BuildTools Cache
      id: custombuildtool-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: tools/CustomBuildTool/bin/Release/**
        key: custombuildtool-${{ runner.os }}-${{ hashFiles('tools/CustomBuildTool/**', '!tools/CustomBuildTool/bin/**') }}
        restore-keys: custombuildtool-${{ runner.os }}-

    - name: BuildThirdParty Cache
      id: thirdparty-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: tools/thirdparty/**
        key: thirdparty-${{ runner.os }}-${{ hashFiles('tools/thirdparty/**', '!tools/thirdparty/bin/**') }}
        restore-keys: thirdparty-${{ runner.os }}-

    - name: Build Tools
      if: steps.custombuildtool-cache.outputs.cache-hit != 'true' || steps.thirdparty-cache.outputs.cache-hit != 'true'
      shell: cmd
      working-directory: ${{github.workspace}}
      run: build\build_init.cmd

    - name: Build Solution
      shell: cmd
      working-directory: ${{github.workspace}}
      run: build\build_debug.cmd

  build-release:
    permissions:
      contents: read
    strategy:
      matrix:
        os: ['windows-latest']
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

    - name: NuGet Cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.config') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Nuget Restore
      shell: cmd
      working-directory: ${{github.workspace}}
      run: nuget restore .\packages.config -PackagesDirectory .\packages\

    - name: BuildTools Cache
      id: custombuildtool-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: tools/CustomBuildTool/bin/Release/**
        key: custombuildtool-${{ runner.os }}-${{ hashFiles('tools/CustomBuildTool/**', '!tools/CustomBuildTool/bin/**') }}
        restore-keys: custombuildtool-${{ runner.os }}-

    - name: BuildThirdParty Cache
      id: thirdparty-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: tools/thirdparty/**
        key: thirdparty-${{ runner.os }}-${{ hashFiles('tools/thirdparty/**', '!tools/thirdparty/bin/**') }}
        restore-keys: thirdparty-${{ runner.os }}-

    - name: Build Tools
      if: steps.custombuildtool-cache.outputs.cache-hit != 'true' || steps.thirdparty-cache.outputs.cache-hit != 'true'
      shell: cmd
      working-directory: ${{github.workspace}}
      run: build\build_init.cmd

    - name: Build Solution
      shell: cmd
      working-directory: ${{github.workspace}}
      run: tools\CustomBuildTool\bin\Release\amd64\CustomBuildTool.exe -bin

    - name: Upload portable packages
      uses: actions/upload-artifact@v4
      with:
        name: imagemanager-portable
        path: |
          build/output/imagemanager-build-win32-bin.zip
          build/output/imagemanager-build-win64-bin.zip
          build/output/imagemanager-build-bin.zip
        if-no-files-found: error

  build-driver:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: ['windows-latest']
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

    - name: NuGet Cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.config') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Nuget Restore
      shell: cmd
      working-directory: ${{github.workspace}}
      run: nuget restore .\packages.config -PackagesDirectory .\packages\

    - name: BuildTools Cache
      id: custombuildtool-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: tools/CustomBuildTool/bin/Release/**
        key: custombuildtool-${{ runner.os }}-${{ hashFiles('tools/CustomBuildTool/**', '!tools/CustomBuildTool/bin/**') }}
        restore-keys: custombuildtool-${{ runner.os }}-

    - name: Build Tools
      if: steps.custombuildtool-cache.outputs.cache-hit != 'true'
      shell: cmd
      working-directory: ${{github.workspace}}
      run: build\build_tools.cmd

    - name: Build Driver
      shell: cmd
      working-directory: ${{github.workspace}}
      run: build\build_zdriver.cmd prefast

  build-driver-release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: ['windows-latest']
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

    - name: NuGet Cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.config') }}
        restore-keys: nuget-${{ runner.os }}-

    - name: Nuget Restore
      shell: cmd
      working-directory: ${{github.workspace}}
      run: nuget restore .\packages.config -PackagesDirectory .\packages\

    - name: BuildTools Cache
      id: custombuildtool-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: tools/CustomBuildTool/bin/Release/**
        key: custombuildtool-${{ runner.os }}-${{ hashFiles('tools/CustomBuildTool/**', '!tools/CustomBuildTool/bin/**') }}
        restore-keys: custombuildtool-${{ runner.os }}-

    - name: Build Tools
      if: steps.custombuildtool-cache.outputs.cache-hit != 'true'
      shell: cmd
      working-directory: ${{github.workspace}}
      run: build\build_tools.cmd

    - name: Build Driver
      shell: cmd
      working-directory: ${{github.workspace}}
      run: build\build_zdriver.cmd release
